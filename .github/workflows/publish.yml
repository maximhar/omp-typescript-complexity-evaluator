name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          ref: refs/heads/${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare publish version
        id: version
        run: echo "version=$(bun scripts/prepare-publish-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Verify package
        run: bun run verify

      - name: Build npm package tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v6
        with:
          name: npm-package-${{ steps.version.outputs.version }}
          path: dist/*.tgz
          if-no-files-found: error

      - name: Publish package to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit published version
        run: |
          if git diff --quiet -- package.json; then
            echo "package.json already at published version"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
